server:
  servlet:
    context-path: /flow-manager
  scheduler:
    fixedRateSetStatusFailed: 300000
    fixedRateWriteOutbox: 5000
    limit: 100
  conversion:
    fromBucket: "sources"
  port: 0
spring:
  application:
    name: flow-manager

  datasource:
    url: ${URL_DB:jdbc:postgresql://localhost:5433/flow-manager}
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    aws:
      s3:
        endpoint: http://localhost:9000
        path-style-access-enabled: true
      credentials:
        access-key: "jora"
        secret-key: "jora1234"
      region:
        static: us-east-1

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topicRequest: conversion-request
    consumer:
      group-conversion-id: conversion
      topic-conversion-response: conversion-response

      group-subscription-id: subscription
      topic-subscription-invalidate-cache: subscription-invalidate-cache

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    url: /openapi/openapi-flow-manager.yaml
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: ${spring.application.name}

services:
  subscription:
    name: subscription
    client:
      api:
        url: http://localhost:8086/subscription
