version: "3"

services:
  postgres-flow-manager:
    image: 'postgres:15-alpine'
    container_name: 'postgres-flow-manager'
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: flow-manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_manager:/var/lib/postgresql/data
    networks:
      - flow-manager
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d flow-manager" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_conversion:
    image: 'postgres:15-alpine'
    container_name: 'postgres_conversion'
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: conversion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_conversion:/var/lib/postgresql/data
    networks:
      - flow-manager
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d conversion" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: 'apache/kafka:latest'
    container_name: 'kafka'
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - flow-manager
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list" ]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: 'minio/minio:latest'
    container_name: 'minio'
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: jora
      MINIO_ROOT_PASSWORD: jora1234
    networks:
      - flow-manager
    volumes:
      - minio_data:/var/lib/minio/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CLUSTERS_0_READONLY: "false"
    networks:
      - flow-manager
    depends_on:
      - kafka

volumes:
  minio_data:
  postgres_manager:
  postgres_conversion:
  kafka_data:

networks:
  flow-manager:
    driver: bridge